name: Sync LeetCode and Build Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 6" # Runs every Saturday

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly allows committing updates back to the repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync LeetCode Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}

      # Fixes the 'fetch first' error by fetching the folders the step above pushed
      - name: Fetch Fresh Sync Folders
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate Readme Dashboard
        run: python build_readme.py

      - name: Commit and Push README Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update LeetCode Dashboard Table [skip ci]"
          git push origin main
